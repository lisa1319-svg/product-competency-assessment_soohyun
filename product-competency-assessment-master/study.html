tespace-nowrap">POS·외부연동</a> </div> </div> <div> <div class="flex items-center rounded-xl hover:bg-slate-100"> <a href="pos.html" class="flex-1 px-2.5 py-2 font-medium text-slate-600 whitespace-nowrap">POS <span id="posNavBadge" class="hidden ml-1 px-1.5 py-0.5 rounded-full bg-rose-500 text-white text-[9px] align-middle">NEW</span></a> <button type="button" id="posNavToggle" class="pos-nav-toggle px-2 text-slate-400 hover:text-slate-700 text-xs" aria-label="하위 지역 펼치기">▾</button> </div> <div id="posSubnav" class="glossary-subnav hidden pl-2.5 space-y-0.5 mt-1 text-xs"> <a href="pos.html?region=전체" class="block px-2.5 py-1.5 rounded-full text-slate-500 hover:bg-slate-100 whitespace-nowrap">전체</a> <a href="pos.html?region=국내" class="block px-2.5 py-1.5 rounded-full text-slate-500 hover:bg-slate-100 whitespace-nowrap">국내</a> <a href="pos.html?region=해외" class="block px-2.5 py-1.5 rounded-full text-slate-500 hover:bg-slate-100 whitespace-nowrap">해외</a> <a href="pos.html?mode=compare" class="block px-2.5 py-1.5 rounded-full text-slate-500 hover:bg-slate-100 whitespace-nowrap">비교</a> </div> </div> <a href="guide.html" class="hidden flex items-center justify-between px-2.5 py-2 rounded-xl font-medium text-slate-600 hover:bg-slate-100 whitespace-nowrap">가이드 <span id="guideNavBadge" class="hidden ml-1 px-1.5 py-0.5 rounded-full bg-rose-500 text-white text-[9px] align-middle">NEW</span></a> <a href="/admin/dashboard.html" id="adminEntryLink" class="hidden flex items-center gap-1.5 px-2.5 py-2 rounded-xl font-medium text-amber-700 bg-amber-50 hover:bg-amber-100 whitespace-nowrap"> 관리자 콘솔</a> </nav> <div class="p-3 border-t border-slate-100 text-xs text-slate-400 flex items-center justify-between gap-2"> <span id="userEmailLabel" class="truncate"></span> <button onclick="AUTH.signOut()" class="text-slate-400 hover:text-rose-500 shrink-0">로그아웃</button> </div> </aside> <!-- 접혔을 때 다시 펼치는 버튼 --> <button id="sidebarOpenBtn" type="button" class="hidden fixed top-4 left-4 z-20 w-7 h-7 flex items-center justify-center bg-white border border-slate-200 rounded-full shadow-sm text-slate-400 hover:bg-slate-50 text-xs" aria-label="사이드바 펼치기">▶</button> <button id="scrollTopBtn" type="button" class="hidden fixed bottom-6 right-6 z-20 w-10 h-10 flex items-center justify-center bg-white border border-slate-200 rounded-full shadow-md text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition" aria-label="맨 위로">↑</button> <!-- 본문: 사이드바 상태와 무관하게 항상 화면 중앙에 고정 --> <div id="contentWrap" class="min-h-screen"> <div id="newNoticeBanner" class="hidden max-w-4xl mx-auto pt-3 px-4"> <div class="bg-rose-50 border border-rose-100 text-rose-700 text-sm rounded-xl px-4 py-2 flex items-center justify-between gap-2"> <span> 새 공지가 등록되었습니다. <a href="notice.html" class="underline font-medium">확인하러 가기 →</a></span> <span class="flex items-center gap-2 shrink-0"> <button type="button" id="hideNoticeBannerToday" class="text-[10px] text-rose-300 hover:text-rose-500 underline">더 이상 보지 않기</button> <button type="button" id="dismissNoticeBanner" class="text-rose-400 hover:text-rose-600 px-1">×</button> </span> </div> </div> <header class="sticky top-0 z-10 bg-white border-b border-slate-200 shadow-sm"> <div class="max-w-4xl mx-auto px-4 py-4"> <h2 class="text-lg font-bold">학습 자료</h2> <p id="periodMessage" class="text-xs text-slate-400 mt-1"></p> </div> </header> <main id="content" class="max-w-4xl mx-auto px-4 py-6 space-y-3"> <p id="statusMessage" class="text-slate-500 text-center py-10">불러오는 중...</p> </main> </div> <script> // 사이드바 접기/펼치기 (localStorage로 상태 기억)
    const MOBILE_BREAKPOINT = 768;
    (function () {
      const sidebar = document.getElementById('sidebar');
      const openBtn = document.getElementById('sidebarOpenBtn');
      const contentWrap = document.getElementById('contentWrap');
      // 화면이 좁을 때(모바일, 작은 팝업 창)는 사이드바가 열리면 본문을 오른쪽으로 밀어서 가려지지 않게 합니다.
      function applyMobileOffset(collapsed) {
        const isNarrow = window.innerWidth <= MOBILE_BREAKPOINT;
        contentWrap.style.marginLeft = (isNarrow && !collapsed) ? '176px' : '';
      }
      function applyState(collapsed) {
        sidebar.classList.toggle('collapsed', collapsed);
        openBtn.classList.toggle('hidden', !collapsed);
        applyMobileOffset(collapsed);
      }
      applyState(localStorage.getItem('sidebarCollapsed') === 'true');
      document.getElementById('sidebarToggle').addEventListener('click', () => {
        localStorage.setItem('sidebarCollapsed', 'true');
        applyState(true);
      });
      openBtn.addEventListener('click', () => {
        localStorage.setItem('sidebarCollapsed', 'false');
        applyState(false);
      });
      window.addEventListener('resize', () => {
        applyMobileOffset(sidebar.classList.contains('collapsed'));
      });
    })();

    // 맨 위로 스크롤 버튼
    (function () {
      const btn = document.getElementById('scrollTopBtn');
      window.addEventListener('scroll', () => {
        btn.classList.toggle('hidden', window.scrollY < 300);
      });
      btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    })();

    function setupNavToggle(toggleId, subnavId) {
      const subnav = document.getElementById(subnavId);
      const btn = document.getElementById(toggleId);
      btn.addEventListener('click', () => {
        subnav.classList.toggle('hidden');
        btn.textContent = subnav.classList.contains('hidden') ? '▾' : '▴';
      });
    }
    setupNavToggle('evalNavToggle', 'evalSubnav');
    setupNavToggle('glossaryNavToggle', 'glossarySubnav');
    setupNavToggle('posNavToggle', 'posSubnav');
    setupNavToggle('learnNavToggle', 'learnSubnav');

    const SHEET_ID = '1MArCmGbnQTSVt2w8FshkKj0WsUN8pFb7PoITb2jrkdc';
    const CONFIG_SHEET_NAME = '설정';
    const EXAM_COLUMN_NAME = '시험범위';

    // 시험범위로 포함할 대상 시트들. columns는 각 시트의 실제 컬럼 순서(왼쪽부터)입니다.
    const SOURCES = [
      { sheet: '제품 용어', page: 'v2.html', columns: ['subCategory', 'term', 'definition', 'note', 'context'] },
      { sheet: '추가 기능 용어', page: 'v2.html', columns: ['subCategory', 'term', 'definition', 'note', 'context'] },
      { sheet: 'UX 용어', page: 'v2.html', columns: ['subCategory', 'term', 'definition', 'note', 'context'] },
      { sheet: 'IT 용어', page: 'v2.html', columns: ['subCategory', 'term', 'definition', 'note', 'context'] },
      { sheet: 'POS 연동 현황', page: 'pos.html', columns: ['region', 'company', 'posName', 'integrationType'] },
      { sheet: '공지', page: 'notice.html', columns: ['id', 'date', 'title', 'content', 'owner', 'link'] },
    ];

    function sheetUrl(sheetName) {
      return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
    }

    // RFC4180 형식의 CSV를 파싱 (따옴표, 콤마, 줄바꿈 포함 셀 지원)
    function parseCSV(text) {
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (inQuotes) {
          if (char === '"' && next === '"') {
            field += '"';
            i++;
          } else if (char === '"') {
            inQuotes = false;
          } else {
            field += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ',') {
            row.push(field);
            field = '';
          } else if (char === '\n' || char === '\r') {
            if (char === '\r' && next === '\n') i++;
            row.push(field);
            rows.push(row);
            row = [];
            field = '';
          } else {
            field += char;
          }
        }
      }
      if (field.length > 0 || row.length > 0) {
        row.push(field);
        rows.push(row);
      }
      return rows.filter(r => r.some(cell => cell.trim() !== ''));
    }

    async function fetchRows(sheetName) {
      const res = await fetch(sheetUrl(sheetName));
      if (!res.ok) throw new Error(`"${sheetName}" 시트를 불러오지 못했습니다.`);
      const text = await res.text();
      return parseCSV(text);
    }

    function isChecked(value) {
      const v = (value || '').trim().toUpperCase();
      return v === 'O' || v === 'TRUE' || v === 'Y' || v === '1' || v === 'V' || v === '✓';
    }

    // 소스마다 컬럼 구성이 달라, 공통 카드 형태({title, summary, page})로 변환합니다.
    function toCard(source, cols) {
      const row = {};
      source.columns.forEach((key, i) => { row[key] = (cols[i] || '').trim(); });

      if (source.sheet === '공지') {
        const div = document.createElement('div');
        div.innerHTML = row.content;
        return { title: row.title, summary: (div.textContent || '').slice(0, 200), page: source.page };
      }
      if (source.sheet === 'POS 연동 현황') {
        return { title: row.posName, summary: `${row.company} · ${row.integrationType}`, page: source.page };
      }
      return { title: row.term, summary: row.definition, page: source.page };
    }

    async function loadExamConfig() {
      try {
        const rows = await fetchRows(CONFIG_SHEET_NAME);
        const [header, ...body] = rows;
        const startIdx = header.findIndex(h => h.trim() === '시작일');
        const endIdx = header.findIndex(h => h.trim() === '종료일');
        if (startIdx === -1 || endIdx === -1 || !body[0]) return null;
        return { start: (body[0][startIdx] || '').trim(), end: (body[0][endIdx] || '').trim() };
      } catch {
        return null;
      }
    }

    async function loadExamItems() {
      const items = [];
      for (const source of SOURCES) {
        const rows = await fetchRows(source.sheet);
        const [header, ...body] = rows;
        const examIdx = header.findIndex(h => h.trim() === EXAM_COLUMN_NAME);
        if (examIdx === -1) continue;
        body.forEach(cols => {
          if (isChecked(cols[examIdx])) items.push(toCard(source, cols));
        });
      }
      items.push(...await loadAdminGlossaryItems());
      items.push(...await loadLearnMaterialItems());
      return items.filter(item => item.title);
    }

    // 학습글 게시판(shared/learn-posts-data.js)에서 examScope: true로 표시된 글만 카드로 노출.
    // 게시글 자체가 실제 HTML 파일이라 카드가 그 파일로 바로 연결된다.
    function loadLearnMaterialItems() {
      return (typeof LEARN_POSTS !== 'undefined' ? LEARN_POSTS : [])
        .filter(p => p.examScope)
        .map(p => ({ title: p.title, summary: p.summary || '', page: p.url }));
    }

    // admin/glossary.html에서 "학습자료에도 노출"(exam_scope) 체크된 용어. 실패해도 시트 카드는 그대로 보인다.
    async function loadAdminGlossaryItems() {
      try {
        const { data, error } = await AUTH.sb.from('glossary_terms').select('term, definition').eq('exam_scope', true);
        if (error) throw error;
        return (data || []).map(row => ({ title: row.term, summary: row.definition, page: 'v2.html' }));
      } catch (err) {
        console.warn('glossary_terms 조회 실패:', err.message);
        return [];
      }
    }

    function renderCard(item) {
      return `
        <article class="rounded-2xl border bg-blue-50 border-blue-100 p-5"> <div class="flex items-baseline justify-between gap-4 mb-1"> <h2 class="text-base font-bold text-slate-900">${escapeHtml(item.title)}</h2> <a href="${item.page}" class="text-xs text-blue-500 hover:underline shrink-0">원본 보기 ↗</a> </div> <div class="text-sm text-slate-700 leading-relaxed">${escapeHtml(item.summary)}</div> </article> `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function todayStr() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    // 다른 페이지에서도 공통으로 쓰는 "새 소식" 확인 (공지 배너 + 사이드바 NEW 표시)
    function daysAgoStr(n) {
      const d = new Date();
      d.setDate(d.getDate() - n);
      const pad = x => String(x).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    async function checkFreshness() {
      try {
        const rows = await fetchRows('공지');
        const [, ...body] = rows;
        const parsed = body
          .map(r => ({ id: Number((r[0] || '').trim()), date: (r[1] || '').trim() }))
          .filter(n => !isNaN(n.id) && n.id);
        const latest = parsed.reduce((a, b) => (a && a.id > b.id ? a : b), null);
        const maxId = latest ? latest.id : 0;

        const seenId = Number(localStorage.getItem('lastSeenNoticeId') || '0');
        if (maxId > seenId) {
          document.getElementById('noticeNavBadge').classList.remove('hidden');
        }

        // 공지가 등록된 당일에는 다시 방문해도(이미 확인했어도) 배너를 계속 띄웁니다.
        const today = daysAgoStr(0);
        const dismissedId = localStorage.getItem('dismissedBannerNoticeId');
        if (latest && latest.date === today && dismissedId !== String(maxId)) {
          const banner = document.getElementById('newNoticeBanner');
          banner.classList.remove('hidden');
          document.getElementById('dismissNoticeBanner').addEventListener('click', () => {
            banner.classList.add('hidden');
          });
          document.getElementById('hideNoticeBannerToday').addEventListener('click', () => {
            localStorage.setItem('dismissedBannerNoticeId', String(maxId));
            banner.classList.add('hidden');
          });
        }
      } catch {}

      try {
        const rows = await fetchRows('가이드');
        const [header, ...body] = rows;
        const looksLikeGuide = header.some(h => ['상황', '질문'].includes((h || '').trim()));
        if (looksLikeGuide) {
          const count = body.filter(r => (r[0] || '').trim()).length;
          const seenCount = Number(localStorage.getItem('guideRowCount') || '0');
          if (count > seenCount) document.getElementById('guideNavBadge').classList.remove('hidden');
        }
      } catch {}

      try {
        const rows = await fetchRows('POS 연동 현황');
        const [, ...body] = rows;
        const count = body.filter(r => (r[2] || '').trim()).length;
        const seenCount = Number(localStorage.getItem('posRowCount') || '0');
        if (count > seenCount) document.getElementById('posNavBadge').classList.remove('hidden');
      } catch {}
    }

    async function init() {
      const content = document.getElementById('content');
      const periodMessage = document.getElementById('periodMessage');

      try {
        const config = await loadExamConfig();

        if (!config) {
          periodMessage.textContent = '공개 기간이 아직 설정되지 않았습니다.';
          content.innerHTML = `
            <p class="text-slate-500 text-center py-10"> 아직 학습 자료 공개 기간이 설정되지 않았습니다.<br /> <span class="text-xs">구글 시트에 "설정" 탭을 만들고 "시작일"/"종료일" 컬럼에 날짜를 입력해주세요.</span> </p>`;
          return;
        }

        const today = todayStr();
        periodMessage.textContent = `공개 기간: ${config.start} ~ ${config.end}`;

        if (today < config.start || today > config.end) {
          content.innerHTML = `<p class="text-slate-500 text-center py-10">지금은 학습 자료 공개 기간이 아닙니다.</p>`;
          return;
        }

        const items = await loadExamItems();
        content.innerHTML = items.length
          ? items.map(renderCard).join('')
          : `<p class="text-slate-500 text-center py-10">아직 학습 자료로 체크된 자료가 없습니다.</p>`;
      } catch (err) {
        content.innerHTML = `
          <p class="text-red-500 text-center py-10"> 데이터를 불러오지 못했습니다.<br /> <span class="text-xs text-slate-400">${escapeHtml(err.message)}</span> </p>`;
      }
    }

    (async () => {
      await init();
      checkFreshness();
    })();
  </script>
</body>
</html>
