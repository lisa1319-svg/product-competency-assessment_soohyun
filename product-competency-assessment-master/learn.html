<div id="contentWrap" class="min-h-screen">
  <header class="sticky top-0 z-10 bg-white border-b border-slate-200 shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-4">
      <h2 class="text-lg font-bold mb-2">학습글</h2>
      <input id="searchInput" type="text" placeholder="제목으로 검색..." class="w-full px-4 py-2 rounded-full border border-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-400" />
    </div>
  </header>
  <main class="max-w-4xl mx-auto px-4 py-6">
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-slate-200 bg-slate-50 text-slate-500 text-xs">
            <th class="px-4 py-2.5 text-left w-16">번호</th>
            <th class="px-4 py-2.5 text-left w-24">카테고리</th>
            <th class="px-4 py-2.5 text-left">제목</th>
            <th class="px-4 py-2.5 text-left w-24">날짜</th>
          </tr>
        </thead>
        <tbody id="boardBody"></tbody>
      </table>
      <p id="emptyMessage" class="hidden text-slate-500 text-center py-10">글이 없습니다.</p>
    </div>
  </main>
</div>
<script>
    const MOBILE_BREAKPOINT = 768;
    (function () {
      const sidebar = document.getElementById('sidebar');
      const openBtn = document.getElementById('sidebarOpenBtn');
      const contentWrap = document.getElementById('contentWrap');
      function applyMobileOffset(collapsed) {
        const isNarrow = window.innerWidth <= MOBILE_BREAKPOINT;
        contentWrap.style.marginLeft = (isNarrow && !collapsed) ? '176px' : '';
      }
      function applyState(collapsed) {
        sidebar.classList.toggle('collapsed', collapsed);
        openBtn.classList.toggle('hidden', !collapsed);
        applyMobileOffset(collapsed);
      }
      applyState(localStorage.getItem('sidebarCollapsed') === 'true');
      document.getElementById('sidebarToggle').addEventListener('click', () => {
        localStorage.setItem('sidebarCollapsed', 'true');
        applyState(true);
      });
      openBtn.addEventListener('click', () => {
        localStorage.setItem('sidebarCollapsed', 'false');
        applyState(false);
      });
      window.addEventListener('resize', () => {
        applyMobileOffset(sidebar.classList.contains('collapsed'));
      });
    })();

    (function () {
      const btn = document.getElementById('scrollTopBtn');
      window.addEventListener('scroll', () => {
        btn.classList.toggle('hidden', window.scrollY < 300);
      });
      btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    })();

    function setupNavToggle(toggleId, subnavId) {
      const subnav = document.getElementById(subnavId);
      const btn = document.getElementById(toggleId);
      btn.addEventListener('click', () => {
        subnav.classList.toggle('hidden');
        btn.textContent = subnav.classList.contains('hidden') ? '▾' : '▴';
      });
    }
    setupNavToggle('evalNavToggle', 'evalSubnav');
    setupNavToggle('glossaryNavToggle', 'glossarySubnav');
    setupNavToggle('posNavToggle', 'posSubnav');
    setupNavToggle('learnNavToggle', 'learnSubnav');

    const CATEGORIES = ['티오더AI', '어드민', 'POS연동'];
    let activeCategory = '전체';

    function updateLearnSubnavActive() {
      document.querySelectorAll('#learnSubnav a').forEach(a => {
        const isActive = a.dataset.cat === activeCategory;
        a.classList.toggle('bg-slate-800', isActive);
        a.classList.toggle('text-white', isActive);
        a.classList.toggle('text-slate-500', !isActive);
        a.classList.toggle('hover:bg-slate-100', !isActive);
      });
    }

    document.querySelectorAll('#learnSubnav a').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        activeCategory = a.dataset.cat;
        document.getElementById('searchInput').value = '';
        updateLearnSubnavActive();
        render();
        history.replaceState(null, '', a.getAttribute('href'));
      });
    });

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // 네이버 카페식 게시판 목록. 제목을 누르면 실제 게시글 HTML 파일(post.url)로 바로 이동한다.
    function renderRow(post, num) {
      return `
        <tr class="board-row border-b border-slate-100 last:border-0 cursor-pointer" data-url="${escapeHtml(post.url)}">
          <td class="px-4 py-3 text-slate-400">${num}</td>
          <td class="px-4 py-3"><span class="text-[11px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 whitespace-nowrap">${escapeHtml(post.category)}</span></td>
          <td class="px-4 py-3 font-medium text-slate-900">${escapeHtml(post.title)}</td>
          <td class="px-4 py-3 text-slate-400">${escapeHtml(post.date || '')}</td>
        </tr>`;
    }

    function render() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      let items = LEARN_POSTS.slice();
      if (activeCategory !== '전체') items = items.filter(p => p.category === activeCategory);
      if (query) items = items.filter(p => p.title.toLowerCase().includes(query));

      const tbody = document.getElementById('boardBody');
      const emptyMessage = document.getElementById('emptyMessage');
      tbody.innerHTML = items.map((p, i) => renderRow(p, items.length - i)).join('');
      emptyMessage.classList.toggle('hidden', items.length > 0);

      tbody.querySelectorAll('.board-row').forEach(row => {
        row.addEventListener('click', () => { location.href = row.dataset.url; });
      });
    }

    function init() {
      const params = new URLSearchParams(location.search);
      const presetCat = params.get('cat');
      if (presetCat && (presetCat === '전체' || CATEGORIES.includes(presetCat))) {
        activeCategory = presetCat;
      }
      updateLearnSubnavActive();
      render();
    }

    document.getElementById('searchInput').addEventListener('input', () => render());

    init();
  </script>
</body>
