<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 권한</title>
<link rel="stylesheet" href="/shared/admin-design.css">
</head>
<body>
<div class="shell"> <nav class="sidebar" id="sidebar"></nav> <header class="topbar" id="topbar"></header> <main class="main"><div class="content"> <div class="page-head"><div> <h1 class="page-title">관리자 권한</h1> <p class="page-desc">역할별 메뉴 접근 권한 설정</p> </div> <button class="btn btn-primary" id="btn-add-admin">관리자 추가</button> </div> <!-- Role explanation --> <div class="panel"> <div class="panel-head"> <h2>권한 설명</h2> </div> <div class="panel-body"> <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:16px;"> <div> <h3 style="font-size:var(--fs-base); font-weight:700; margin-bottom:6px; display:flex; align-items:center; gap:6px;"> <span class="badge badge--danger">Super Admin</span> </h3> <p style="font-size:var(--fs-xs); color:var(--text-tertiary); line-height:1.6;">전체 시스템 관리, 관리자 계정 추가/삭제 권한 보유. 신중하게 배정하세요.</p> </div> <div> <h3 style="font-size:var(--fs-base); font-weight:700; margin-bottom:6px; display:flex; align-items:center; gap:6px;"> <span class="badge badge--info">Operator</span> </h3> <p style="font-size:var(--fs-xs); color:var(--text-tertiary); line-height:1.6;">문항, 평가, 학습자료 등 콘텐츠·운영 관리. 조직·사용자 및 권한 관리는 불가.</p> </div> <div> <h3 style="font-size:var(--fs-base); font-weight:700; margin-bottom:6px; display:flex; align-items:center; gap:6px;"> <span class="badge badge--neutral">Viewer</span> </h3> <p style="font-size:var(--fs-xs); color:var(--text-tertiary); line-height:1.6;">조회 전용. 데이터 생성/수정/삭제 불가. 분석 리포트 확인만 가능.</p> </div> </div> </div> </div> <!-- Admin List --> <div id="admins-container"></div> </div></main>
</div> <!-- Modal: Add Admin -->
<dialog class="modal" id="modal-add-admin"> <div class="modal-head"> <h3>관리자 추가</h3> <button class="modal-close" onclick="document.getElementById('modal-add-admin').close()">✕</button> </div> <div class="modal-body"> <div class="field-grid"> <div class="field-row"> <label class="field-label">이메일 <span class="req">*</span></label> <div class="field-value"> <input type="email" id="form-email" class="input" placeholder="example@torder.com"> <div style="font-size:var(--fs-xs); color:var(--text-tertiary); margin-top:4px;">@torder.com 도메인만 허용됩니다.</div> </div> </div> <div class="field-row"> <label class="field-label">역할 <span class="req">*</span></label> <div class="field-value"> <select id="form-role" class="input"> <option value="">역할 선택</option> <option value="super_admin">Super Admin</option> <option value="operator">Operator</option> <option value="viewer">Viewer</option> </select> </div> </div> </div> </div> <div class="modal-foot"> <button class="btn btn-outline" onclick="document.getElementById('modal-add-admin').close()">취소</button> <button class="btn btn-primary" id="btn-save-admin">추가</button> </div>
</dialog> <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/shared/config.js"></script>
<script src="/shared/auth.js"></script>
<script src="/shared/nav.js"></script>
<script>
let allAdmins = []
let currentAuth = null

const ROLE_LABELS = {
  super_admin: 'Super Admin',
  operator: 'Operator',
  viewer: 'Viewer'
}

const ROLE_BADGES = {
  super_admin: 'badge--danger',
  operator: 'badge--info',
  viewer: 'badge--neutral'
}

async function init() {
  const auth = await AUTH.requirePage({admin: true})
  if (!auth) return
  currentAuth = auth

  renderAdminShell({
    role: auth.role,
    current: '/admin/admin-roles.html',
    email: auth.email,
    rounds: [],
    sidebarMount: 'sidebar',
    topbarMount: 'topbar'
  })

  await loadData()
  renderAdmins()

  document.getElementById('btn-add-admin').addEventListener('click', () => {
    clearForm()
    document.getElementById('modal-add-admin').showModal()
  })

  document.getElementById('btn-save-admin').addEventListener('click', saveAdmin)
}

async function loadData() {
  const {data: admins} = await AUTH.sb.from('admins').select('*').order('created_at', {ascending: true})
  allAdmins = admins || []
}

async function renderAdmins() {
  if (allAdmins.length === 0) {
    document.getElementById('admins-container').innerHTML = `
      <div class="empty-state"> <div class="empty-state__icon"></div> <div>등록된 관리자가 없습니다</div> </div> `
    return
  }

  const rows = allAdmins.map((admin) => {
    const createdDate = new Date(admin.created_at).toLocaleDateString('ko-KR')
    const isSuperAdmin = admin.role === 'super_admin'
    const isCurrentUser = admin.email === currentAuth.email
    const canDelete = currentAuth.role === 'super_admin' && !isCurrentUser

    return `
      <tr> <td>${escapeHtml(admin.email)}</td> <td><span class="badge ${ROLE_BADGES[admin.role]}">${ROLE_LABELS[admin.role]}</span></td> <td>${createdDate}</td> <td> <button
            class="btn btn-sm btn-danger"
            onclick="deleteAdmin('${escapeAttr(admin.email)}')"
            ${!canDelete ? 'disabled' : ''}
            title="${!canDelete ? (isCurrentUser ? '본인은 삭제 불가' : 'Super Admin만 삭제 가능') : '삭제'}"> 삭제
          </button> </td> </tr> `
  }).join('')

  document.getElementById('admins-container').innerHTML = `
    <div class="panel"> <div class="panel-head"> <h2>관리자 목록</h2> <span style="font-size:var(--fs-sm); color:var(--text-muted);">총 ${allAdmins.length}명</span> </div> <div class="table-wrap"> <table class="data-table"> <thead> <tr> <th>이메일</th> <th>역할</th> <th>등록일</th> <th style="width:80px;">작업</th> </tr> </thead> <tbody> ${rows}
          </tbody> </table> </div> </div> `
}

async function saveAdmin() {
  const email = document.getElementById('form-email').value.trim().toLowerCase()
  const role = document.getElementById('form-role').value

  if (!email || !role) {
    alert('이메일과 역할은 필수입니다.')
    return
  }

  if (!email.endsWith('@torder.com')) {
    alert('@torder.com 도메인 이메일만 추가 가능합니다.')
    return
  }

  if (allAdmins.find(a => a.email === email)) {
    alert('이미 등록된 관리자입니다.')
    return
  }

  try {
    const {error} = await AUTH.sb.from('admins').insert([{
      email,
      role
    }])

    if (error) {
      if (error.message.includes('super_admin') || error.code === '42501') {
        alert('Super Admin 권한이 있는 계정만 관리자를 추가할 수 있습니다.')
      } else {
        alert('추가 실패: ' + error.message)
      }
      return
    }

    await logAudit('admin.add', `${email} (${ROLE_LABELS[role]}) 추가`)
    document.getElementById('modal-add-admin').close()
    await loadData()
    renderAdmins()
  } catch (err) {
    alert('오류: ' + err.message)
  }
}

async function deleteAdmin(email) {
  if (!confirm(`${email}을(를) 관리자에서 제거하시겠습니까?`)) return

  try {
    const {error} = await AUTH.sb.from('admins').delete().eq('email', email)

    if (error) {
      if (error.message.includes('super_admin') || error.code === '42501') {
        alert('Super Admin 권한이 있는 계정만 관리자를 삭제할 수 있습니다.')
      } else {
        alert('삭제 실패: ' + error.message)
      }
      return
    }

    await logAudit('admin.remove', `${email} 제거`)
    await loadData()
    renderAdmins()
  } catch (err) {
    alert('오류: ' + err.message)
  }
}

async function logAudit(action, detail) {
  await AUTH.sb.from('admin_audit_log').insert([{
    actor_email: currentAuth.email,
    action,
    detail
  }])
}

function clearForm() {
  document.getElementById('form-email').value = ''
  document.getElementById('form-role').value = ''
}

function escapeHtml(text) {
  const div = document.createElement('div')
  div.textContent = text
  return div.innerHTML
}

function escapeAttr(text) {
  return String(text).replace(/"/g, '&quot;').replace(/'/g, '&#39;')
}

init()
</script>
</body>
</html>
