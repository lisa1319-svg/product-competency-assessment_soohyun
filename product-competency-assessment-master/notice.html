    const MOBILE_BREAKPOINT = 768;
    (function () {
      const sidebar = document.getElementById('sidebar');
      const openBtn = document.getElementById('sidebarOpenBtn');
      const contentWrap = document.getElementById('contentWrap');
      // 화면이 좁을 때(모바일, 작은 팝업 창)는 사이드바가 열리면 본문을 오른쪽으로 밀어서 가려지지 않게 합니다.
      function applyMobileOffset(collapsed) {
        const isNarrow = window.innerWidth <= MOBILE_BREAKPOINT;
        contentWrap.style.marginLeft = (isNarrow && !collapsed) ? '176px' : '';
      }
      function applyState(collapsed) {
        sidebar.classList.toggle('collapsed', collapsed);
        openBtn.classList.toggle('hidden', !collapsed);
        applyMobileOffset(collapsed);
      }
      applyState(localStorage.getItem('sidebarCollapsed') === 'true');
      document.getElementById('sidebarToggle').addEventListener('click', () => {
        localStorage.setItem('sidebarCollapsed', 'true');
        applyState(true);
      });
      openBtn.addEventListener('click', () => {
        localStorage.setItem('sidebarCollapsed', 'false');
        applyState(false);
      });
      window.addEventListener('resize', () => {
        applyMobileOffset(sidebar.classList.contains('collapsed'));
      });
    })();

    // 맨 위로 스크롤 버튼
    (function () {
      const btn = document.getElementById('scrollTopBtn');
      window.addEventListener('scroll', () => {
        btn.classList.toggle('hidden', window.scrollY < 300);
      });
      btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    })();

    function setupNavToggle(toggleId, subnavId) {
      const subnav = document.getElementById(subnavId);
      const btn = document.getElementById(toggleId);
      btn.addEventListener('click', () => {
        subnav.classList.toggle('hidden');
        btn.textContent = subnav.classList.contains('hidden') ? '▾' : '▴';
      });
    }
    setupNavToggle('evalNavToggle', 'evalSubnav');
    setupNavToggle('glossaryNavToggle', 'glossarySubnav');
    setupNavToggle('posNavToggle', 'posSubnav');
    setupNavToggle('learnNavToggle', 'learnSubnav');

    // 공지 데이터 소스
    const NOTICE_SHEET_ID = '1MArCmGbnQTSVt2w8FshkKj0WsUN8pFb7PoITb2jrkdc';
    const NOTICE_SHEET_NAME = '공지';

    // 관련어 연결을 위한 용어집 데이터 소스 ("종료 및 변경"은 이미 끝난 개념이라 관련어 후보에서 제외)
    const GLOSSARY_SOURCES = [
      { sheetId: '1MArCmGbnQTSVt2w8FshkKj0WsUN8pFb7PoITb2jrkdc', categories: ['제품 용어', '추가 기능 용어', 'UX 용어', 'IT 용어'], page: 'v2.html' },
    ];

    const MAX_RELATED_TERMS = 15;

    // 최근 며칠 이내 등록된 공지를 "새 공지"로 강조할지 (오늘 포함 3일 전까지)
    const NEW_NOTICE_WINDOW_DAYS = 3;

    // 공지 입력 보호용 비밀번호 (가벼운 저지선 — 강력한 보안은 아닙니다)
    const NOTICE_PASSWORD = '190103';

    // 구글 시트에 새 공지를 기록할 Apps Script 웹 앱 주소
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzyZwSfE8qKyUpJt_65WlpL-bbKhT7UNTDmZzSZ2PStZy1bV_ZSaPUNQh6DgZtGz7TJNQ/exec';

    function sheetUrl(sheetId, sheetName) {
      return `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
    }

    // RFC4180 형식의 CSV를 파싱 (따옴표, 콤마, 줄바꿈 포함 셀 지원)
    function parseCSV(text) {
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (inQuotes) {
          if (char === '"' && next === '"') {
            field += '"';
            i++;
          } else if (char === '"') {
            inQuotes = false;
          } else {
            field += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ',') {
            row.push(field);
            field = '';
          } else if (char === '\n' || char === '\r') {
            if (char === '\r' && next === '\n') i++;
            row.push(field);
            rows.push(row);
            row = [];
            field = '';
          } else {
            field += char;
          }
        }
      }
      if (field.length > 0 || row.length > 0) {
        row.push(field);
        rows.push(row);
      }
      return rows.filter(r => r.some(cell => cell.trim() !== ''));
    }

    async function fetchCSV(sheetId, sheetName) {
      const res = await fetch(sheetUrl(sheetId, sheetName));
      if (!res.ok) throw new Error(`"${sheetName}" 시트를 불러오지 못했습니다.`);
      const text = await res.text();
      return parseCSV(text);
    }

    async function loadNotices() {
      const rows = await fetchCSV(NOTICE_SHEET_ID, NOTICE_SHEET_NAME);
      const [header, ...body] = rows;
      return body.map(cols => ({
        id: (cols[0] || '').trim(),
        date: (cols[1] || '').trim(),
        title: (cols[2] || '').trim(),
        content: (cols[3] || '').trim(),
        owner: (cols[4] || '').trim(),
        link: (cols[5] || '').trim(),
      })).filter(item => item.title)
        // 날짜가 최신인 공지가 위로 오도록 정렬 (날짜가 같으면 나중에 등록된 것이 위로)
        .sort((a, b) => {
          if (a.date !== b.date) return a.date < b.date ? 1 : -1;
          return Number(b.id) - Number(a.id);
        });
    }

    // 용어집 전체를 불러와 "용어 -> 정의/페이지" 매핑을 만듭니다.
    async function loadTermIndex() {
      const terms = [];
      for (const source of GLOSSARY_SOURCES) {
        for (const category of source.categories) {
          const rows = await fetchCSV(source.sheetId, category);
          const [header, ...body] = rows;
          body.forEach(cols => {
            const term = (cols[1] || '').trim();
            const definition = (cols[2] || '').trim();
            const note = (cols[3] || '').trim();
            if (term) terms.push({ term, definition, note, page: source.page });
          });
        }
      }
      // 긴 용어부터 매칭해야 짧은 용어의 부분 문자열 오탐이 줄어듭니다.
      return terms.sort((a, b) => b.term.length - a.term.length);
    }

    // HTML 태그를 걷어내고 눈에 보이는 텍스트만 남깁니다 (굵게/목록 태그가 단어를 끊어놓는 것 방지).
    function stripHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      return div.textContent || '';
    }

    // 용어 매칭 시 의미 없는 조사/포괄 단어는 단독으로 매칭되지 않도록 걸러냅니다.
    const RELATED_TERM_STOPWORDS = new Set([
      '기능', '방식', '서비스', '화면', '설정', '관리', '시스템', '항목', '정보',
      '상태', '절차', '방법', '경우', '대상', '확인', '처리', '내용', '기준',
      '값', '수', '것', '및', '등', '그', '이',
      // 티오더/포스/오더/매장은 사내 용어 대부분에 공통으로 붙는 접두어라 그 자체로는 변별력이 없습니다.
      // ("티오더"라는 표기 안에 "오더"가 부분 문자열로 포함되어 있어, "오더"를 막지 않으면
      //  "티오더"만 언급해도 "오더 ○○" 계열 용어가 전부 관련어로 잘못 잡힙니다.)
      '티오더', '포스', '버전', '실행', '오더', '매장',
      // 공지가 항상 같은 형식("안녕하세요. AI플랫폼실입니다", "~사전 안내드립니다",
      // "배포 및 적용 일시")으로 시작해서, 이 안의 단어들이 매번 반복적으로 오탐을 일으킵니다.
      '안내', '플랫폼', 'AI', '적용',
    ]);

    function termTokens(term) {
      return term
        .split(/[\s()/·ㆍ,、]+/)
        .map(t => t.trim())
        .filter(t => t.length >= 2 && !RELATED_TERM_STOPWORDS.has(t));
    }

    function findRelatedTerms(text, termIndex) {
      const haystack = text.toLowerCase();
      const found = [];
      const seen = new Set();
      for (const item of termIndex) {
        if (seen.has(item.term)) continue;
        if (item.term.length < 2) continue;

        const termLower = item.term.toLowerCase();
        let matched = haystack.includes(termLower);

        // 전체 문구가 그대로 없어도, 의미 있는 핵심 단어가 포함되어 있으면 매칭합니다.
        if (!matched) {
          const tokens = termTokens(item.term);
          matched = tokens.some(tok => haystack.includes(tok.toLowerCase()));
        }

        if (matched) {
          found.push(item);
          seen.add(item.term);
        }
        if (found.length >= MAX_RELATED_TERMS) break;
      }
      return found;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // 리치 텍스트 편집기에서 저장된 실제 HTML인지, 예전 방식의 일반 텍스트인지 구분합니다.
    function looksLikeHtml(str) {
      return /<\/?[a-z][\s\S]*>/i.test(str);
    }

    // 편집기에서 저장된 HTML 중 허용된 태그/속성만 남기고 나머지는 제거합니다.
    function sanitizeHtml(html) {
      const allowedTags = new Set(['B', 'STRONG', 'I', 'EM', 'U', 'S', 'STRIKE', 'UL', 'OL', 'LI', 'BR', 'A', 'DIV', 'SPAN', 'P']);
      const template = document.createElement('template');
      template.innerHTML = html;

      const clean = (parent) => {
        [...parent.childNodes].forEach(node => {
          if (node.nodeType === Node.ELEMENT_NODE) {
            if (!allowedTags.has(node.tagName)) {
              while (node.firstChild) parent.insertBefore(node.firstChild, node);
              parent.removeChild(node);
              return;
            }
            [...node.attributes].forEach(attr => {
              if (!(node.tagName === 'A' && attr.name === 'href')) {
                node.removeAttribute(attr.name);
              }
            });
            if (node.tagName === 'A') {
              node.setAttribute('target', '_blank');
              node.setAttribute('rel', 'noopener');
            }
            clean(node);
          } else if (node.nodeType !== Node.TEXT_NODE) {
            parent.removeChild(node);
          }
        });
      };

      clean(template.content);
      return template.innerHTML;
    }

    // *텍스트*를 굵게 표시합니다 (예전 방식의 일반 텍스트 입력과의 호환용)
    function renderContentText(str) {
      if (looksLikeHtml(str)) return sanitizeHtml(str);
      return escapeHtml(str).replace(/\*([^\n*]+)\*/g, '<strong>$1</strong>');
    }

    // [이름](링크) 형식은 클릭 가능한 뱃지로, [이름]만 있으면 링크 없는 뱃지로 표시합니다.
    function renderInquiryText(str) {
      const linkRegex = /\[([^\]]+)\](?:\(([^)]+)\))?/g;
      const parts = [];
      let lastIndex = 0;
      let match;
      while ((match = linkRegex.exec(str)) !== null) {
        if (match.index > lastIndex) {
          parts.push(escapeHtml(str.slice(lastIndex, match.index)));
        }
        const label = escapeHtml(match[1]);
        const url = match[2] ? escapeHtml(match[2]) : '';
        if (url) {
          parts.push(`<a href="${url}" target="_blank" rel="noopener" class="inline-block px-2 py-0.5 mx-0.5 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-800 hover:text-white transition">${label}</a>`);
        } else {
          parts.push(`<span class="inline-block px-2 py-0.5 mx-0.5 rounded-full bg-slate-100 text-slate-600">${label}</span>`);
        }
        lastIndex = linkRegex.lastIndex;
      }
      if (lastIndex < str.length) {
        parts.push(escapeHtml(str.slice(lastIndex)));
      }
      return parts.join('').replace(/\n/g, '<br/>');
    }

    // 오늘 날짜 기준 N일 전 날짜 문자열 (YYYY-MM-DD)
    function daysAgoStr(n) {
      const d = new Date();
      d.setDate(d.getDate() - n);
      const pad = x => String(x).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    function isNewNotice(dateStr) {
      return dateStr >= daysAgoStr(NEW_NOTICE_WINDOW_DAYS);
    }

    let lastNotices = [];

    // 공지 본문 텍스트 안에서 관련어와 일치하는 부분을 찾아 호버 가능한 span으로 감쌉니다.
    // 관련어 판정(findRelatedTerms)과 같은 방식으로, 전체 문구가 없으면 핵심 단어(토큰) 단위로도 찾습니다.
    function highlightTermsInElement(container, relatedTerms) {
      if (!relatedTerms.length) return;
      const terms = [...relatedTerms].sort((a, b) => b.term.length - a.term.length);

      const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
      const textNodes = [];
      let node;
      while ((node = walker.nextNode())) textNodes.push(node);

      textNodes.forEach(textNode => {
        const text = textNode.nodeValue;
        const lower = text.toLowerCase();
        const matches = [];

        terms.forEach(t => {
          const termLower = t.term.toLowerCase();
          const addMatch = (needle) => {
            if (needle.length < 2) return;
            let idx = 0;
            while ((idx = lower.indexOf(needle, idx)) !== -1) {
              const end = idx + needle.length;
              const overlaps = matches.some(m => idx < m.end && end > m.start);
              if (!overlaps) matches.push({ start: idx, end, term: t });
              idx = end;
            }
          };

          const before = matches.length;
          addMatch(termLower);
          // 전체 문구가 그대로 안 잡혔으면, 관련어 판정 때와 같은 핵심 단어(토큰)로 다시 시도합니다.
          if (matches.length === before) {
            termTokens(t.term).forEach(tok => addMatch(tok.toLowerCase()));
          }
        });

        if (!matches.length) return;
        matches.sort((a, b) => a.start - b.start);

        const frag = document.createDocumentFragment();
        let cursor = 0;
        matches.forEach(m => {
          if (m.start > cursor) frag.appendChild(document.createTextNode(text.slice(cursor, m.start)));
          const span = document.createElement('span');
          span.className = 'inline-term-highlight';
          span.dataset.term = m.term.term;
          span.dataset.definition = m.term.definition;
          span.dataset.note = m.term.note || '';
          span.textContent = text.slice(m.start, m.end);
          frag.appendChild(span);
          cursor = m.end;
        });
        if (cursor < text.length) frag.appendChild(document.createTextNode(text.slice(cursor)));
        textNode.parentNode.replaceChild(frag, textNode);
      });
    }

    function renderNotices(notices, termIndex) {
      lastNotices = notices;
      const content = document.getElementById('content');

      const noticeRelated = notices.map(notice => findRelatedTerms(`${notice.title} ${stripHtml(notice.content)}`, termIndex)
      );

      const cards = notices.map((notice, i) => {
        const relatedTerms = noticeRelated[i];
        const isNew = isNewNotice(notice.date);
        const cardColorClass = isNew ? 'bg-rose-50 border-rose-200' : 'bg-blue-50 border-blue-100';

        const chips = relatedTerms.map(({ term, definition, note }) => `
          <button type="button" class="term-chip inline-block px-3 py-1 rounded-full text-xs font-medium bg-white border border-slate-300 text-slate-600 hover:bg-slate-800 hover:text-white hover:border-slate-800 transition" data-term="${escapeHtml(term)}" data-definition="${escapeHtml(definition)}" data-note="${escapeHtml(note)}">${escapeHtml(term)}</button> `).join('');

        return `
          <article class="rounded-2xl border ${cardColorClass} p-5"> <div class="flex items-baseline justify-between gap-4 mb-2"> <h2 class="text-base font-bold text-slate-900 flex items-center gap-2"> ${escapeHtml(notice.title)}
                ${isNew ? '<span class="px-1.5 py-0.5 rounded-full bg-rose-500 text-white text-[9px] align-middle">NEW</span>' : ''}
              </h2> <span class="text-xs text-slate-400 shrink-0">${escapeHtml(notice.date)}</span> </div> <div class="rich-content text-sm text-slate-700 leading-relaxed whitespace-pre-line" data-notice-index="${i}">${renderContentText(notice.content)}</div> <div class="flex items-start justify-between gap-4 mt-3 text-xs text-slate-400"> <span class="leading-relaxed">${renderInquiryText(notice.owner)}</span> <span class="flex items-center gap-3 shrink-0"> ${notice.link ? `<a href="${escapeHtml(notice.link)}" target="_blank" rel="noopener" class="text-blue-500 hover:underline">원문 보기 ↗</a>` : ''}
                <button type="button" class="edit-notice-btn text-slate-300 hover:text-blue-500 underline" data-id="${escapeHtml(notice.id)}">수정</button> <button type="button" class="delete-notice-btn text-slate-300 hover:text-red-500 underline" data-id="${escapeHtml(notice.id)}">삭제</button> </span> </div> ${relatedTerms.length ? `
              <div class="mt-4 pt-3 border-t border-black/5"> <div class="text-xs text-slate-400 mb-2">관련어</div> <div class="flex flex-wrap gap-1.5">${chips}</div> </div> ` : ''}
          </article> `;
      });

      content.innerHTML = cards.length
        ? cards.join('')
        : `<p class="text-slate-500 text-center py-10">등록된 공지가 없습니다.</p>`;

      content.querySelectorAll('.rich-content[data-notice-index]').forEach(el => {
        const idx = Number(el.dataset.noticeIndex);
        highlightTermsInElement(el, noticeRelated[idx]);
      });
    }

    let allNotices = [];
    let lastTermIndex = [];

    // 시작일/종료일 입력값을 기준으로 공지 목록을 좁힙니다 (비어 있으면 해당 방향은 제한 없음).
    function applyDateFilter(notices) {
      const from = document.getElementById('dateFrom').value;
      const to = document.getElementById('dateTo').value;
      if (!from && !to) return notices;
      return notices.filter(n => {
        if (from && n.date < from) return false;
        if (to && n.date > to) return false;
        return true;
      });
    }

    function renderFiltered() {
      renderNotices(applyDateFilter(allNotices), lastTermIndex);
    }

    // 이 페이지가 곧 공지 목록이므로, 방문 시 가장 최신 공지 id를 "확인함"으로 기록합니다
    // (다른 페이지의 새 공지 배너/뱃지가 여기서 갱신된 값을 기준으로 사라집니다).
    function markNoticesSeen(notices) {
      const ids = notices.map(n => Number(n.id)).filter(n => !isNaN(n));
      if (ids.length) localStorage.setItem('lastSeenNoticeId', String(Math.max(...ids)));
    }

    // 사이드바의 가이드/POS NEW 표시만 확인합니다 (공지 자체는 이 페이지가 곧 목록이므로 생략).
    async function checkFreshnessOthers() {
      try {
        const rows = await fetchCSV(NOTICE_SHEET_ID, '가이드');
        const [header, ...body] = rows;
        const looksLikeGuide = header.some(h => ['상황', '질문'].includes((h || '').trim()));
        if (looksLikeGuide) {
          const count = body.filter(r => (r[0] || '').trim()).length;
          const seenCount = Number(localStorage.getItem('guideRowCount') || '0');
          if (count > seenCount) document.getElementById('guideNavBadge').classList.remove('hidden');
        }
      } catch {}

      try {
        const rows = await fetchCSV(NOTICE_SHEET_ID, 'POS 연동 현황');
        const [, ...body] = rows;
        const count = body.filter(r => (r[2] || '').trim()).length;
        const seenCount = Number(localStorage.getItem('posRowCount') || '0');
        if (count > seenCount) document.getElementById('posNavBadge').classList.remove('hidden');
      } catch {}
    }

    async function init() {
      try {
        const [notices, termIndex] = await Promise.all([loadNotices(), loadTermIndex()]);
        allNotices = notices;
        lastTermIndex = termIndex;
        markNoticesSeen(notices);
        renderFiltered();
      } catch (err) {
        document.getElementById('content').innerHTML = `
          <p class="text-red-500 text-center py-10"> 공지를 불러오지 못했습니다.<br /> 구글 시트에 "공지" 탭이 있는지, 공유 설정이 "링크가 있는 모든 사용자 - 뷰어"로 되어 있는지 확인해주세요.<br /> <span class="text-xs text-slate-400">${escapeHtml(err.message)}</span> </p>`;
      }
    }

    document.getElementById('dateFrom').addEventListener('change', renderFiltered);
    document.getElementById('dateTo').addEventListener('change', renderFiltered);
    document.getElementById('dateFilterReset').addEventListener('click', () => {
      document.getElementById('dateFrom').value = '';
      document.getElementById('dateTo').value = '';
      renderFiltered();
    });

    let pendingAction = null;
    let editingId = null;

    function setupNoticeForm() {
      const openBtn = document.getElementById('openNoticeForm');
      const passwordModal = document.getElementById('passwordModal');
      const passwordInput = document.getElementById('passwordInput');
      const passwordError = document.getElementById('passwordError');
      const formModal = document.getElementById('formModal');
      const formModalTitle = document.getElementById('formModalTitle');
      const noticeForm = document.getElementById('noticeForm');
      const submitError = document.getElementById('submitError');
      const submitBtn = document.getElementById('submitNotice');
      const content = document.getElementById('content');

      // 기존 공지의 담당자 텍스트("문의 채널 : ...\n담당자 : ...")를 두 입력창 값으로 되돌립니다.
      function fillInquiryFields(owner) {
        const channelMatch = owner.match(/문의\s*채널\s*:\s*(.+)/);
        const ownerMatch = owner.match(/담당자\s*:\s*(.+)/);
        noticeForm.inquiryChannel.value = channelMatch ? channelMatch[1].trim() : '';
        noticeForm.inquiryOwner.value = ownerMatch ? ownerMatch[1].trim() : '';
      }

      function openEditForm(notice) {
        editingId = notice.id;
        formModalTitle.textContent = '공지 수정';
        submitBtn.textContent = '수정';
        noticeForm.date.value = notice.date;
        noticeForm.title.value = notice.title;
        contentEditor.innerHTML = looksLikeHtml(notice.content)
          ? sanitizeHtml(notice.content)
          : escapeHtml(notice.content).replace(/\n/g, '<br>');
        fillInquiryFields(notice.owner);
        noticeForm.link.value = notice.link;
        submitError.classList.add('hidden');
        formModal.classList.remove('hidden');
      }

      function openPasswordGate(action) {
        pendingAction = action;
        passwordInput.value = '';
        passwordError.classList.add('hidden');
        passwordModal.classList.remove('hidden');
        passwordInput.focus();
      }

      const contentEditor = document.getElementById('contentEditor');

      document.querySelectorAll('.toolbar-btn').forEach(btn => {
        // 버튼 클릭 시 편집기의 선택 영역(포커스)이 풀리지 않도록 막습니다.
        btn.addEventListener('mousedown', (e) => e.preventDefault());
        btn.addEventListener('click', () => {
          const cmd = btn.dataset.cmd;
          if (cmd === 'createLink') {
            const url = prompt('연결할 링크 주소를 입력하세요:');
            if (url) document.execCommand('createLink', false, url);
          } else {
            document.execCommand(cmd);
          }
          contentEditor.focus();
        });
      });

      // 목록 안에서 Tab/Shift+Tab으로 하위/상위 계층 이동
      contentEditor.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
          e.preventDefault();
          document.execCommand(e.shiftKey ? 'outdent' : 'indent');
        }
      });

      openBtn.addEventListener('click', () => {
        openPasswordGate(() => {
          editingId = null;
          formModalTitle.textContent = '새 공지 입력';
          submitBtn.textContent = '등록';
          noticeForm.reset();
          contentEditor.innerHTML = '';
          submitError.classList.add('hidden');
          formModal.classList.remove('hidden');
        });
      });

      // 카드가 다시 그려질 때마다 버튼도 새로 생기므로, 이벤트 위임으로 처리합니다.
      content.addEventListener('click', (e) => {
        const deleteBtn = e.target.closest('.delete-notice-btn');
        if (deleteBtn) {
          const id = deleteBtn.dataset.id;
          openPasswordGate(() => deleteNotice(id));
          return;
        }

        const editBtn = e.target.closest('.edit-notice-btn');
        if (editBtn) {
          const id = editBtn.dataset.id;
          const notice = lastNotices.find(n => n.id === id);
          if (notice) openPasswordGate(() => openEditForm(notice));
          return;
        }

        const chip = e.target.closest('.term-chip');
        if (chip) {
          e.stopPropagation();
          toggleTermPopup(chip);
          return;
        }

        // 본문 안의 관련어는 터치 기기에서 호버가 없으므로 탭(클릭)으로도 뜨게 합니다.
        const inlineTerm = e.target.closest('.inline-term-highlight');
        if (inlineTerm) {
          e.stopPropagation();
          toggleTermPopup(inlineTerm);
        }
      });

      // 본문 안의 관련어는 마우스를 올리면 바로 뜨고, 벗어나면 바로 닫힙니다.
      content.addEventListener('mouseover', (e) => {
        const inlineTerm = e.target.closest('.inline-term-highlight');
        if (inlineTerm) showTermPopup(inlineTerm, false);
      });
      content.addEventListener('mouseout', (e) => {
        const inlineTerm = e.target.closest('.inline-term-highlight');
        if (inlineTerm && !inlineTerm.contains(e.relatedTarget)) hideTermPopup();
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('#termPopup') && !e.target.closest('.term-chip') && !e.target.closest('.inline-term-highlight')) {
          hideTermPopup();
        }
      });

      document.getElementById('cancelPassword').addEventListener('click', () => {
        passwordModal.classList.add('hidden');
        pendingAction = null;
      });

      document.getElementById('confirmPassword').addEventListener('click', () => {
        if (passwordInput.value.trim() === NOTICE_PASSWORD) {
          passwordModal.classList.add('hidden');
          const action = pendingAction;
          pendingAction = null;
          if (action) action();
        } else {
          passwordError.classList.remove('hidden');
        }
      });

      passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('confirmPassword').click();
      });

      document.getElementById('cancelForm').addEventListener('click', () => {
        formModal.classList.add('hidden');
        editingId = null;
      });

      noticeForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!contentEditor.innerText.trim()) {
          submitError.textContent = '내용을 입력해주세요.';
          submitError.classList.remove('hidden');
          return;
        }

        const formData = new FormData(noticeForm);
        const inquiryChannel = formData.get('inquiryChannel').trim();
        const inquiryOwner = formData.get('inquiryOwner').trim();
        const owner = [
          inquiryChannel ? `문의 채널 : ${inquiryChannel}` : '',
          inquiryOwner ? `담당자 : ${inquiryOwner}` : '',
        ].filter(Boolean).join('\n');

        const payload = editingId ? {
          action: 'update',
          id: editingId,
          date: formData.get('date'),
          title: formData.get('title'),
          content: contentEditor.innerHTML,
          owner,
          link: formData.get('link'),
        } : {
          date: formData.get('date'),
          title: formData.get('title'),
          content: contentEditor.innerHTML,
          owner,
          link: formData.get('link'),
        };

        const isEditing = !!editingId;
        submitError.classList.add('hidden');
        submitBtn.disabled = true;
        submitBtn.textContent = isEditing ? '수정 중...' : '등록 중...';

        try {
          await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload),
          });
          formModal.classList.add('hidden');
          editingId = null;
          await init();
        } catch (err) {
          submitError.textContent = (isEditing ? '수정에 실패했습니다: ' : '등록에 실패했습니다: ') + err.message;
          submitError.classList.remove('hidden');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = isEditing ? '수정' : '등록';
        }
      });
    }

    let termPopupTimer = null;

    function hideTermPopup() {
      document.getElementById('termPopup').classList.add('hidden');
      document.getElementById('termPopup').dataset.openFor = '';
      if (termPopupTimer) clearTimeout(termPopupTimer);
    }

    function showTermPopup(el, autoHide) {
      const popup = document.getElementById('termPopup');
      const term = el.dataset.term;

      document.getElementById('termPopupTitle').textContent = term;
      document.getElementById('termPopupDefinition').textContent = el.dataset.definition;
      const noteEl = document.getElementById('termPopupNote');
      if (el.dataset.note) {
        noteEl.textContent = el.dataset.note;
        noteEl.classList.remove('hidden');
      } else {
        noteEl.classList.add('hidden');
      }

      // popup은 position: fixed라서 뷰포트 기준 좌표를 그대로 씁니다 (scrollY를 더하면 안 됨).
      popup.classList.remove('hidden');
      const rect = el.getBoundingClientRect();
      const popupHeight = popup.offsetHeight;
      const spaceBelow = window.innerHeight - rect.bottom;
      const top = spaceBelow >= popupHeight + 12 ? rect.bottom + 6 : rect.top - popupHeight - 6;

      popup.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - popup.offsetWidth - 8)) + 'px';
      popup.style.top = Math.max(8, top) + 'px';
      popup.dataset.openFor = term;

      if (termPopupTimer) clearTimeout(termPopupTimer);
      if (autoHide) termPopupTimer = setTimeout(hideTermPopup, 4000);
    }

    // 관련어 칩(클릭): 같은 용어를 다시 누르면 닫히고, 4초 후 자동으로 닫힙니다.
    function toggleTermPopup(chip) {
      const popup = document.getElementById('termPopup');
      if (popup.dataset.openFor === chip.dataset.term && !popup.classList.contains('hidden')) {
        hideTermPopup();
        return;
      }
      showTermPopup(chip, true);
    }

    async function deleteNotice(id) {
      try {
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'delete', id }),
        });
        await init();
      } catch (err) {
        alert('삭제에 실패했습니다: ' + err.message);
      }
    }

    setupNoticeForm();
    (async () => {
      await init();
      checkFreshnessOthers();
    })();
  </script>
</body>
